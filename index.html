<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.5/three.js/ar.js"></script>
</head>
<body style="margin: 0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <!-- 9x9 Green Plane -->
            <a-plane 
                position="0 0 0" 
                rotation="-90 0 0" 
                width="9" 
                height="9"
                color="green">
            </a-plane>
            
            <!-- Box in center for reference -->
            <a-box 
                position="0 0.3 0" 
                scale="0.5 0.5 0.5"
                color="red">
            </a-box>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
