<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AR Terrain Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #ui {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0,0,0,0.8); color: #0f0;
            padding: 15px; border-radius: 8px; z-index: 100;
            font-family: monospace; font-size: 13px; border: 2px solid #0f0;
        }
        #status { margin-top: 10px; color: #ff0; }
        button {
            margin-top: 10px; padding: 8px 12px;
            background: #0f0; color: #000; border: none;
            border-radius: 4px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div>🎮 AR TERRAIN</div>
        <div id="status">Loading...</div>
        <button onclick="startCamera()">START CAMERA</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusEl = document.getElementById('status');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let scene, renderer, camera;

        function log(msg) {
            console.log(msg);
            statusEl.textContent = msg;
        }

        async function startCamera() {
            try {
                log('Accessing camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    log('✅ Camera active!');
                    setTimeout(initThreeJS, 500);
                };
            } catch (err) {
                log('❌ Camera error: ' + err.message);
            }
        }

        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 0.4;

            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Create 9x9 green terrain
            const geom = new THREE.BufferGeometry();
            const vertices = [];
            const indices = [];

            const size = 0.9, half = size / 2, step = size / 9;
            for (let z = 0; z <= 9; z++) {
                for (let x = 0; x <= 9; x++) {
                    const px = x * step - half;
                    const pz = z * step - half;
                    const py = (Math.sin(x * 0.3) * Math.cos(z * 0.3)) * 0.1;
                    vertices.push(px, py, pz);
                }
            }

            for (let z = 0; z < 9; z++) {
                for (let x = 0; x < 9; x++) {
                    const a = z * 10 + x;
                    const b = z * 10 + x + 1;
                    const c = (z + 1) * 10 + x;
                    const d = (z + 1) * 10 + x + 1;
                    indices.push(a, c, b, b, c, d);
                }
            }

            geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
            geom.setIndex(new THREE.BufferAttribute(new Uint32Array(indices), 1));
            geom.computeVertexNormals();

            const mat = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x003300 });
            const mesh = new THREE.Mesh(geom, mat);
            scene.add(mesh);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.PointLight(0xffffff, 0.5);
            light.position.set(5, 5, 5);
            scene.add(light);

            log('🌍 9x9 Terrain Ready!');
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
            if (renderer) renderer.setSize(window.innerWidth, window.innerHeight);
        });

        log('📱 Tap START CAMERA');
    </script>
</body>
</html>
